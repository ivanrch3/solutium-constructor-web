<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1200" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="1200" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FBFF" />
      <stop offset="0.55" stop-color="#EEF6FF" />
      <stop offset="1" stop-color="#F7F7FF" />
    </linearGradient>
    <radialGradient id="core" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(800 550) rotate(90) scale(210)">
      <stop stop-color="#FFFFFF" />
      <stop offset="0.45" stop-color="#DBEAFE" />
      <stop offset="1" stop-color="#93C5FD" />
    </radialGradient>
    <linearGradient id="cylinder" x1="645" y1="300" x2="955" y2="300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#C4B5FD" />
      <stop offset="0.5" stop-color="#E9D5FF" />
      <stop offset="1" stop-color="#BFDBFE" />
    </linearGradient>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18" />
    </filter>
  </defs>

  <rect width="1600" height="1200" fill="url(#bg)" />

  <circle cx="320" cy="220" r="120" fill="#DBEAFE" opacity="0.55" filter="url(#blur)" />
  <circle cx="1280" cy="980" r="160" fill="#E9D5FF" opacity="0.45" filter="url(#blur)" />
  <ellipse cx="800" cy="930" rx="280" ry="72" fill="#93C5FD" opacity="0.18" />

  <g>
    <rect x="645" y="300" width="310" height="520" rx="155" fill="url(#cylinder)" opacity="0.78" />
    <circle cx="800" cy="550" r="205" fill="url(#core)" opacity="0.96" />

    <rect x="500" y="430" width="130" height="130" rx="30" fill="#C4B5FD" opacity="0.7" transform="rotate(-14 500 430)" />
    <rect x="970" y="320" width="145" height="145" rx="34" fill="#BFDBFE" opacity="0.72" transform="rotate(14 970 320)" />
    <rect x="980" y="670" width="96" height="96" rx="24" fill="#DDD6FE" opacity="0.68" transform="rotate(12 980 670)" />
  </g>
</svg>
